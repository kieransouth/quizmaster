# Standalone overlay for docker-compose.yml.
#
# Use:
#     docker compose -f docker-compose.yml -f docker-compose.standalone.yml up -d
#
# Publishes the web service on the host so any reverse proxy (Caddy,
# nginx, Cloudflare Tunnel) — or no proxy at all — can reach the stack.
# The web container's built-in /api proxy means a single host port
# serves the whole app.
#
# WEB_PORT defaults to 8080 if unset. The bind is on 127.0.0.1 by default
# so the app is only reachable from a reverse proxy on the same host;
# replace with "0.0.0.0:${WEB_PORT}:80" (or just "${WEB_PORT}:80") to
# publish on all interfaces.

services:
  web:
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:80"
