# Quizmaster — universal self-hosted stack.
#
# Base file. Defines the services but does NOT expose them to the host —
# pick exactly one overlay so the stack is reachable:
#
#   Standalone (any reverse proxy in front, or none):
#     docker compose -f docker-compose.yml -f docker-compose.standalone.yml up -d
#   Traefik (label-based routing on an existing Traefik instance):
#     docker compose -f docker-compose.yml -f docker-compose.traefik.yml up -d
#
# The web container's nginx reverse-proxies /api → api:8080, so the
# standalone overlay only needs to publish a single port.
#
# Per-deployment settings (host, cert resolver, port, secrets) live in
# .env — copy from .env.example.

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: quizmaster-api
    restart: unless-stopped
    depends_on:
      - postgres
      - ollama
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Jwt__SigningKey: "${JWT_SIGNING_KEY}"
      Jwt__Issuer: "quizmaster"
      Jwt__Audience: "quizmaster"
      Ai__DefaultProvider: "Ollama"
      Ai__DefaultModel: "${OLLAMA_DEFAULT_MODEL}"
      Ai__Providers__Ollama__BaseUrl: "http://ollama:11434"
      Ai__Providers__Ollama__Enabled: "${OLLAMA_ENABLED:-true}"
      # Cloud-provider API keys are per-user (saved via the Settings page,
      # encrypted at rest). The server does not hold any cloud keys.
      Auth__RegistrationEnabled: "${REGISTRATION_ENABLED:-true}"
      # Persistent key ring for ASP.NET Core Data Protection. Without this
      # mount, every container restart invalidates every saved user API key.
      DataProtection__KeyRingPath: "/var/lib/quizmaster/dataprotection-keys"
    volumes:
      - dataprotection-keys:/var/lib/quizmaster/dataprotection-keys
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        # Defaults to noindex,nofollow so self-hosted private deploys
        # don't leak into search results. Set WEB_ROBOTS=index,follow
        # in .env to opt in.
        WEB_ROBOTS: "${WEB_ROBOTS:-noindex,nofollow}"
    container_name: quizmaster-web
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    container_name: quizmaster-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: quizmaster-ollama
    restart: unless-stopped
    environment:
      # Authenticates the local Ollama daemon to Ollama Cloud so cloud-hosted
      # models (qwen2.5:72b, kimi-k2, etc.) are reachable through the local
      # http://ollama:11434 endpoint.
      OLLAMA_API_KEY: "${OLLAMA_CLOUD_API_KEY}"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres-data:
  ollama-data:
  dataprotection-keys:
