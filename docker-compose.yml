# Quizmaster — universal self-hosted stack.
#
# Base file. Publishes the web service on a host port so the whole app is
# reachable behind any reverse proxy (Caddy, nginx, Cloudflare Tunnel) or
# none. The web container's nginx also reverse-proxies /api → api:8080,
# so a single host port serves the whole app.
#
# Using Traefik? Stack the overlay:
#     docker compose -f docker-compose.yml -f docker-compose.traefik.yml up -d
# That re-attaches the services to your existing Traefik `web` network and
# adds the routing labels.
#
# Per-deployment settings (host, cert resolver, port, secrets) live in
# .env — copy from .env.example.

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: quizmaster-api
    restart: unless-stopped
    depends_on:
      - postgres
      - ollama
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Jwt__SigningKey: "${JWT_SIGNING_KEY}"
      Jwt__Issuer: "quizmaster"
      Jwt__Audience: "quizmaster"
      Ai__DefaultProvider: "Ollama"
      Ai__DefaultModel: "${OLLAMA_DEFAULT_MODEL}"
      Ai__Providers__Ollama__BaseUrl: "http://ollama:11434"
      Ai__Providers__OpenAI__ApiKey: "${OPENAI_API_KEY:-}"
      Ai__Providers__Anthropic__ApiKey: "${ANTHROPIC_API_KEY:-}"
      Auth__RegistrationEnabled: "${REGISTRATION_ENABLED:-true}"
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: quizmaster-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      # Bound to localhost by default so a reverse proxy on the same host
      # can point at it without exposing the app to the public network.
      # Change to "0.0.0.0:${WEB_PORT}:80" (or just "${WEB_PORT}:80") to
      # publish on all interfaces.
      - "127.0.0.1:${WEB_PORT:-8080}:80"
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    container_name: quizmaster-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: quizmaster-ollama
    restart: unless-stopped
    environment:
      # Authenticates the local Ollama daemon to Ollama Cloud so cloud-hosted
      # models (qwen2.5:72b, kimi-k2, etc.) are reachable through the local
      # http://ollama:11434 endpoint.
      OLLAMA_API_KEY: "${OLLAMA_CLOUD_API_KEY}"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres-data:
  ollama-data:
