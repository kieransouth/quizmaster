<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quizmaster</title>

    <meta name="description"  content="AI-powered quiz wizard for team trivia nights — generate, fact-check, and host quizzes from any LLM, all in your browser." />
    <meta name="theme-color"  content="#4f46e5" />

    <!-- Privacy by default. Vite substitutes %VITE_ROBOTS% at build time;
         the live deploy sets WEB_ROBOTS=index,follow to opt in. -->
    <meta name="robots"       content="%VITE_ROBOTS%" />
    <meta name="googlebot"    content="%VITE_ROBOTS%" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Quizmaster — AI quiz wizard for team trivia" />
    <meta property="og:description" content="Generate, fact-check, and host pub-style quizzes from any LLM. Self-hostable, MIT-licensed." />
    <meta property="og:url"         content="https://quizmaster.spicy.gg" />
    <meta property="og:image"       content="https://quizmaster.spicy.gg/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Quizmaster — AI quiz wizard for team trivia" />
    <meta name="twitter:description" content="Generate, fact-check, and host pub-style quizzes from any LLM. Self-hostable, MIT-licensed." />
    <meta name="twitter:image"       content="https://quizmaster.spicy.gg/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
