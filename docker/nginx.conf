server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback — all non-asset routes serve index.html so
    # client-side routing works for /login, /quizzes/:id, etc.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets get a long cache (Vite output is content-hashed)
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Reverse-proxy /api to the api container. The trailing slash on
    # proxy_pass strips the /api prefix so the API receives /auth, /quizzes,
    # etc. SSE-safe: buffering off, long read timeout, HTTP/1.1 keepalive.
    # When fronted by Traefik, the /api router bypasses nginx entirely so
    # this block is unused — harmless either way.
    location /api/ {
        proxy_pass http://api:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 1h;
    }
}
