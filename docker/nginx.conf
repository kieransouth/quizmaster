server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback — all non-asset routes serve index.html so
    # client-side routing works for /login, /quizzes/:id, etc.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets get a long cache (Vite output is content-hashed)
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}
