name: build

on:
  push:
    branches: [main]
  pull_request:

env:
  # Opt into Node 24 for the JavaScript actions ahead of GitHub's June 2026
  # default switch. Removes the deprecation banner from every run.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  api:
    name: api · build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

  web:
    name: web · build & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
