name: Feature request
description: A thing Quizmaster doesn't do but should
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What's the problem?
      description: What are you trying to do that Quizmaster makes hard or impossible?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      description: Sketch of a solution. Doesn't have to be detailed — happy to figure it out together.
    validations:
      required: false
